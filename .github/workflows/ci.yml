name: CI

# CI runs lint + tests against the offline stub provider only.
# It must NEVER call a live LLM — no API keys are referenced here.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      EAIP_LLM_PROVIDER: stub
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # The test suite imports the rag + orchestration stacks (qdrant, langgraph,
        # sentence-transformers, ...), so CI installs those extras. The llm extra is
        # NOT installed — CI runs entirely on the offline stub provider/embedder/
        # reranker and never calls a live model.
        run: uv sync --extra rag --extra orchestration

      - name: Lint (ruff)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test (pytest)
        run: uv run pytest
